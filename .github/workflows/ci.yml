name: CI

# Verify both halves of the stack on every change to main:
#   • backend  — install deps and byte-compile all Python (fast syntax gate)
#   • frontend — install deps and run a full Next.js production build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual re-runs from the Actions tab (no CLI/auth required).
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint-and-compile:
    name: Backend · lint & compile
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Verify Python syntax (py_compile)
        # The required top-level check, extended to the router/service packages
        # so the whole backend is syntax-verified, not just the root modules.
        run: python -m py_compile backend/*.py backend/routers/*.py backend/services/*.py

  frontend-build:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
